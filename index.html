<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Pricing component with toggle switch</title>
  </head>
  <body>
    <div class="container">
      <div class="container__header">
        <h1 class="container__header-title">Our Pricing</h1>
        <div class="container__header-toggle">
          <p class="container__header-toggleText">Annually</p>
          <label class="toggle">
            <input type="checkbox" id="btnToggle" name="btnToggle" />
            <span class="slider"></span>
          </label>
          <p class="container__header-toggleText">Monthly</p>
        </div>
      </div>
      <div class="container__cards">
        <div class="container__cards-card">
          <h2 class="container__cards-cardTitle">Basic</h2>
          <p class="container__cards-cardPricing">&dollar;199.99</p>
          <p class="container__cards-cardText">500 GB Storage</p>
          <p class="container__cards-cardText">2 Users Allowed</p>
          <p class="container__cards-cardText">Send up to 3 GB</p>
          <button class="container__cards-cardButton">Learn More</button>
        </div>

        <div class="container__cards-card card--accent">
          <h2 class="container__cards-cardTitle">Professional</h2>
          <p class="container__cards-cardPricing">&dollar;249.99</p>
          <p class="container__cards-cardText">1 TB Storage</p>
          <p class="container__cards-cardText">5 Users Allowed</p>
          <p class="container__cards-cardText">Send up to 10 GB</p>
          <button class="container__cards-cardButton btn--white">
            Learn More
          </button>
        </div>

        <div class="container__cards-card">
          <h2 class="container__cards-cardTitle">Master</h2>
          <p class="container__cards-cardPricing">&dollar;399.99</p>
          <p class="container__cards-cardText">2 TB Storage</p>
          <p class="container__cards-cardText">10 Users Allowed</p>
          <p class="container__cards-cardText">Send up to 20 GB</p>
          <button class="container__cards-cardButton">Learn More</button>
        </div>
      </div>
    </div>
    <!--&dollar;19.99 &dollar;199.99 500 GB Storage 2 Users Allowed Send up to 3 GB
    Learn More Professional &dollar;24.99 &dollar;249.99 1 TB Storage 5 Users
    Allowed Send up to 10 GB Learn More Master &dollar;39.99 &dollar;399.99 2 TB
    Storage 10 Users Allowed Send up to 20 GB Learn More-->

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://www.linkedin.com/in/yannlf3/">YannLf3</a>.
    </footer>
  </body>
</html>
